spring.application.name=api

spring.datasource.url=jdbc:postgresql://localhost:5432/explore_app
spring.datasource.username=explore_user
spring.datasource.password=explore_password

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

spring.flyway.enabled=true

management.endpoints.web.exposure.include=health

security.jwt.secret=${JWT_SECRET:change-this-development-secret-key-please-1234567890}
security.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
