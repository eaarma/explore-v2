spring.application.name=api
spring.config.import=optional:file:.env[.properties],optional:file:apps/api/.env[.properties]

spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

spring.flyway.enabled=true

management.endpoints.web.exposure.include=health

app.cors.allowed-origin-patterns=${APP_CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:*,http://127.0.0.1:*}

security.jwt.secret=${JWT_SECRET}
security.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

security.rate-limit.enabled=${RATE_LIMIT_ENABLED:true}
security.rate-limit.login.max-requests=${RATE_LIMIT_LOGIN_MAX_REQUESTS:5}
security.rate-limit.login.window=${RATE_LIMIT_LOGIN_WINDOW:PT1M}
security.rate-limit.register.max-requests=${RATE_LIMIT_REGISTER_MAX_REQUESTS:5}
security.rate-limit.register.window=${RATE_LIMIT_REGISTER_WINDOW:PT15M}
security.rate-limit.discovery.max-requests=${RATE_LIMIT_DISCOVERY_MAX_REQUESTS:120}
security.rate-limit.discovery.window=${RATE_LIMIT_DISCOVERY_WINDOW:PT1M}
security.rate-limit.admin-image-upload.max-requests=${RATE_LIMIT_ADMIN_IMAGE_UPLOAD_MAX_REQUESTS:20}
security.rate-limit.admin-image-upload.window=${RATE_LIMIT_ADMIN_IMAGE_UPLOAD_WINDOW:PT10M}

firebase.storage.bucket=${FIREBASE_STORAGE_BUCKET:}
firebase.storage.location-image-root=${FIREBASE_LOCATION_IMAGE_STORAGE_ROOT:locations}

backup.scheduler.enabled=${BACKUP_SCHEDULER_ENABLED:false}
backup.scheduler.cron=${BACKUP_SCHEDULER_CRON:0 15 0 * * *}
backup.scheduler.zone=${BACKUP_SCHEDULER_ZONE:UTC}
backup.retention-days=${BACKUP_RETENTION_DAYS:14}
backup.firebase-storage-bucket=${BACKUP_FIREBASE_STORAGE_BUCKET:${FIREBASE_STORAGE_BUCKET:}}
backup.firebase-prefix=${BACKUP_FIREBASE_PREFIX:backups/postgres}
backup.file-prefix=${BACKUP_FILE_PREFIX:explore-app-postgres}
backup.output-directory=${BACKUP_OUTPUT_DIRECTORY:${java.io.tmpdir}/explore-db-backups}
backup.pg-dump-command=${BACKUP_PG_DUMP_COMMAND:pg_dump}
backup.database.host=${BACKUP_DATABASE_HOST:}
backup.database.port=${BACKUP_DATABASE_PORT:}
backup.database.name=${BACKUP_DATABASE_NAME:}
backup.database.user=${BACKUP_DATABASE_USER:${SPRING_DATASOURCE_USERNAME:}}
backup.database.password=${BACKUP_DATABASE_PASSWORD:${SPRING_DATASOURCE_PASSWORD:}}

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
