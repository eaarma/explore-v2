services:
  explore-postgres:
    image: postgis/postgis:16-3.4
    container_name: explore-postgres
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      POSTGRES_DB: explore_app
      POSTGRES_USER: explore_user
      POSTGRES_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
    volumes:
      - explore_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U explore_user -d explore_app"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  explore-api:
    image: ghcr.io/YOUR_GITHUB_USER/YOUR_BACKEND_IMAGE:latest
    container_name: explore-api
    restart: unless-stopped
    depends_on:
      explore-postgres:
        condition: service_healthy
    env_file:
      - ./.env
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:postgresql://explore-postgres:5432/explore_app
      SPRING_DATASOURCE_USERNAME: explore_user
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
    ports:
      - "127.0.0.1:8081:8080"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -fsS http://localhost:8080/actuator/health || exit 1",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 40s

volumes:
  explore_postgres_data:
