services:
  db:
    image: postgis/postgis:16-3.4
    restart: unless-stopped
    # Create apps/api/.env.production from apps/api/.env.production.example first.
    env_file:
      - ./apps/api/.env.production
    environment:
      POSTGRES_DB: explore_app
      POSTGRES_USER: explore_app
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./apps/api/docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U explore_app -d explore_app"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - ./apps/api/.env.production
    # The compose stack always connects the API to the internal db service.
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/explore_app
      SPRING_DATASOURCE_USERNAME: explore_app
    ports:
      - "127.0.0.1:8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 40s
    # If you prefer a file mount instead of FIREBASE_SERVICE_ACCOUNT_BASE64,
    # create the JSON file on the VPS and uncomment the lines below.
    # volumes:
    #   - ./secrets/firebase-service-account.json:/run/secrets/firebase-service-account.json:ro

volumes:
  postgres_data:
