name: Nightly Database Backup

on:
  schedule:
    - cron: "15 0 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: nightly-db-backup
  cancel-in-progress: false

jobs:
  backup:
    name: Backup PostgreSQL to Firebase Storage
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 30
    env:
      BACKUP_DATABASE_HOST: ${{ secrets.BACKUP_DATABASE_HOST }}
      BACKUP_DATABASE_PORT: ${{ secrets.BACKUP_DATABASE_PORT }}
      BACKUP_DATABASE_NAME: ${{ secrets.BACKUP_DATABASE_NAME }}
      BACKUP_DATABASE_USER: ${{ secrets.BACKUP_DATABASE_USER }}
      BACKUP_DATABASE_PASSWORD: ${{ secrets.BACKUP_DATABASE_PASSWORD }}
      BACKUP_FIREBASE_STORAGE_BUCKET: ${{ secrets.BACKUP_FIREBASE_STORAGE_BUCKET }}
      BACKUP_FIREBASE_PREFIX: backups/postgres
      BACKUP_RETENTION_DAYS: 14

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install --yes postgresql-client

      - name: Set up Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Authenticate to Firebase Storage service account
        env:
          FIREBASE_SERVICE_ACCOUNT_BASE64: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_BASE64 }}
        run: |
          if [ -z "${FIREBASE_SERVICE_ACCOUNT_BASE64}" ]; then
            echo "FIREBASE_SERVICE_ACCOUNT_BASE64 must be configured as a repository secret." >&2
            exit 1
          fi

          printf '%s' "${FIREBASE_SERVICE_ACCOUNT_BASE64}" | base64 --decode > "${RUNNER_TEMP}/firebase-service-account.json"
          gcloud auth activate-service-account --key-file="${RUNNER_TEMP}/firebase-service-account.json"

      - name: Make backup scripts executable
        run: chmod +x scripts/backups/*.sh

      - name: Create and upload backup
        run: ./scripts/backups/backup-postgres-to-firebase.sh

      - name: Delete backups older than 14 days
        run: ./scripts/backups/prune-firebase-backups.sh
