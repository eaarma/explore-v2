name: CI

on:
  pull_request:
  push:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend Test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_DB: explore_app
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d explore_app"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        shell: bash
        working-directory: apps/api

    env:
      SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/explore_app
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      JWT_SECRET: ci-test-jwt-secret-ci-test-jwt-secret
      APP_CORS_ALLOWED_ORIGIN_PATTERNS: http://localhost:*,http://127.0.0.1:*

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install --yes postgresql-client

      - name: Enable PostGIS extension
        run: |
          PGPASSWORD=postgres psql \
            --host localhost \
            --username postgres \
            --dbname explore_app \
            --command "CREATE EXTENSION IF NOT EXISTS postgis;"

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Run backend tests
        run: ./gradlew test --no-daemon

  mobile:
    name: Mobile Lint, Typecheck, and Test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    defaults:
      run:
        shell: bash
        working-directory: apps/mobile

    env:
      CI: true
      EXPO_PUBLIC_API_URL: https://example.invalid

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: apps/mobile/package-lock.json

      - name: Install mobile dependencies
        run: npm ci

      - name: Run mobile lint
        run: npm run lint

      - name: Run mobile typecheck
        run: npx tsc --noEmit --pretty false

      - name: Run mobile tests
        run: npm run test:ci
