name: Backend CI

on:
  pull_request:
  push:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend Test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_DB: explore_app
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d explore_app"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        shell: bash
        working-directory: apps/api

    env:
      SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/explore_app
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      JWT_SECRET: ci-test-jwt-secret-ci-test-jwt-secret
      APP_CORS_ALLOWED_ORIGIN_PATTERNS: http://localhost:*,http://127.0.0.1:*

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install --yes postgresql-client

      - name: Enable PostGIS extension
        run: |
          PGPASSWORD=postgres psql \
            --host localhost \
            --username postgres \
            --dbname explore_app \
            --command "CREATE EXTENSION IF NOT EXISTS postgis;"

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Run backend tests
        run: ./gradlew test --no-daemon

      - name: Log in to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build Docker image
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          docker build \
            -t ghcr.io/${{ github.repository_owner }}/explore-api:${{ github.sha }} \
            .

      - name: Push Docker image
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: docker push ghcr.io/${{ github.repository_owner }}/explore-api:${{ github.sha }}

  deploy-api:
    name: Deploy API to production
    runs-on: ubuntu-latest
    needs: backend
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production

    steps:
      - name: Deploy API via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd ${{ secrets.EXPLORE_DEPLOY_PATH }}

            export EXPLORE_API_IMAGE_TAG=${{ github.sha }}

            docker compose pull explore-api
            docker compose up -d --no-deps explore-api
            docker compose ps explore-api

      - name: Verify API health
        run: |
          for i in {1..12}; do
            if curl -fsS https://api.explore.tourhub.space/actuator/health > /dev/null; then
              echo "Explore API is healthy"
              exit 0
            fi
            echo "Waiting for Explore API..."
            sleep 5
          done
          echo "Explore API did not become healthy in time"
          exit 1
